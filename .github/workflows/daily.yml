name: ETF Ranking

on:
  schedule:
    # 每10分钟, 周一至周五 UTC 1:00-7:59 = 北京时间 9:00-15:59
    - cron: '*/10 1-7 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pandas requests
      - uses: actions/cache@v4
        with:
          path: cache
          key: klines-v3
      - run: python main.py
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
